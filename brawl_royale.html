<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Brawl Royale</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: bold;
        }
        canvas {
            background-color: #27ae60; /* Césped */
            border: 5px solid #2c3e50;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <div id="ui">Brawlers Vivos: <span id="vivos">5</span> | Cubos de Fuerza: <span id="cubos">0</span></div>
    <canvas id="gameCanvas" width="1000" height="700"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Estado del Juego
let juegoTerminado = false;
let mensajeFinal = "";

// La Tormenta (Zona)
const zona = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radio: 550,
    velocidadEncojer: 0.15
};

// Jugador Principal
const jugador = {
    x: 150,
    y: 150,
    radio: 20,
    color: '#3498db', // Azul Brawl
    velocidad: 4,
    vidaMax: 4000,
    vida: 4000,
    fuerza: 0,
    vivo: true
};

// Teclado y Ratón
const teclas = {};
const raton = { x: 0, y: 0 };

window.addEventListener('keydown', e => teclas[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => teclas[e.key.toLowerCase()] = false);
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    raton.x = e.clientX - rect.left;
    raton.y = e.clientY - rect.top;
});

// Disparar
canvas.addEventListener('mousedown', e => {
    if (e.button === 0 && jugador.vivo && !juegoTerminado) {
        disparar(jugador, raton.x, raton.y);
    }
});

// Listas de entidades
const balas = [];
const bots = [
    { id: 1, x: 800, y: 150, radio: 20, color: '#e74c3c', velocidad: 2.5, vidaMax: 4000, vida: 4000, fuerza: 0, vivo: true, ultimoDisparo: 0 },
    { id: 2, x: 150, y: 550, radio: 20, color: '#e74c3c', velocidad: 2.5, vidaMax: 4500, vida: 4500, fuerza: 0, vivo: true, ultimoDisparo: 0 },
    { id: 3, x: 800, y: 550, radio: 20, color: '#e74c3c', velocidad: 2.5, vidaMax: 3500, vida: 3500, fuerza: 0, vivo: true, ultimoDisparo: 0 },
    { id: 4, x: 500, y: 350, radio: 20, color: '#e74c3c', velocidad: 2.5, vidaMax: 5000, vida: 5000, fuerza: 0, vivo: true, ultimoDisparo: 0 }
];
const cajas = [
    { x: 300, y: 250, tamaño: 30, vida: 3 },
    { x: 700, y: 250, tamaño: 30, vida: 3 },
    { x: 500, y: 500, tamaño: 30, vida: 3 }
];

function disparar(creador, destinoX, destinoY) {
    const angulo = Math.atan2(destinoY - creador.y, destinoX - creador.x);
    balas.push({
        x: creador.x,
        y: creador.y,
        vx: Math.cos(angulo) * 10,
        vy: Math.sin(angulo) * 10,
        daño: 800 + (creador.fuerza * 200),
        origen: creador,
        distanciaMax: 300,
        distanciaRecorrida: 0
    });
}

// Lógica de actualización
function update() {
    if (juegoTerminado) return;

    // 1. Movimiento del Jugador
    if (jugador.vivo) {
        if (teclas['w'] && jugador.y > jugador.radio) jugador.y -= jugador.velocidad;
        if (teclas['s'] && jugador.y < canvas.height - jugador.radio) jugador.y += jugador.velocidad;
        if (teclas['a'] && jugador.x > jugador.radio) jugador.x -= jugador.velocidad;
        if (teclas['d'] && jugador.x < canvas.width - jugador.radio) jugador.x += jugador.velocidad;

        // Comprobar daño por tormenta
        const distACentro = Math.hypot(jugador.x - zona.x, jugador.y - zona.y);
        if (distACentro > zona.radio) jugador.vida -= 5; // Daño constante
        if (jugador.vida <= 0) { jugador.vivo = false; verificarFinJuego(); }
    }

    // 2. Encoger la Tormenta
    if (zona.radio > 80) zona.radio -= zona.velocidadEncojer;

    // 3. IA de los Bots
    bots.forEach(bot => {
        if (!bot.vivo) return;

        // Moverse hacia el centro si la tormenta los alcanza, o hacia el jugador si está cerca
        const distAlJugador = Math.hypot(jugador.x - bot.x, jugador.y - bot.y);
        const distACentroBot = Math.hypot(bot.x - zona.x, bot.y - zona.y);

        if (distACentroBot > zona.radio - 40) {
            // Huir de la tormenta hacia el centro
            const anguloCentro = Math.atan2(zona.y - bot.y, zona.x - bot.x);
            bot.x += Math.cos(anguloCentro) * bot.velocidad;
            bot.y += Math.sin(anguloCentro) * bot.velocidad;
        } else if (distAlJugador < 250 && jugador.vivo) {
            // Perseguir e intentar disparar al jugador
            const anguloJ = Math.atan2(jugador.y - bot.y, jugador.x - bot.x);
            bot.x += Math.cos(anguloJ) * bot.velocidad * 0.7;
            bot.y += Math.sin(anguloJ) * bot.velocidad * 0.7;

            // Disparar cada cierto tiempo (Cooldown)
            let ahora = Date.now();
            if (ahora - bot.ultimoDisparo > 1200) {
                disparar(bot, jugador.x, jugador.y);
                bot.ultimoDisparo = ahora;
            }
        }

        // Daño de tormenta al bot
        if (distACentroBot > zona.radio) bot.vida -= 5;
        if (bot.vida <= 0) { bot.vivo = false; verificarFinJuego(); }
    });

    // 4. Lógica de Balas
    for (let i = balas.length - 1; i >= 0; i--) {
        const b = balas[i];
        b.x += b.vx;
        b.y += b.vy;
        b.distanciaRecorrida += Math.hypot(b.vx, b.vy);

        // Borrar bala si llega a su rango máximo
        if (b.distanciaRecorrida > b.distanciaMax) {
            balas.splice(i, 1);
            continue;
        }

        // Colisión Bala -> Cajas
        cajas.forEach((caja, cIdx) => {
            if (caja.vida > 0 && b.x > caja.x && b.x < caja.x + caja.tamaño && b.y > caja.y && b.y < caja.y + caja.tamaño) {
                caja.vida--;
                balas.splice(i, 1);
                if (caja.vida <= 0 && b.origen === jugador) {
                    jugador.fuerza++;
                    jugador.vidaMax += 400;
                    jugador.vida = Math.min(jugador.vida + 1000, jugador.vidaMax);
                }
            }
        });

        // Colisión Bala -> Jugador
        if (jugador.vivo && b.origen !== jugador && Math.hypot(jugador.x - b.x, jugador.y - b.y) < jugador.radio) {
            jugador.vida -= b.daño;
            balas.splice(i, 1);
            if (jugador.vida <= 0) { jugador.vivo = false; verificarFinJuego(); }
            continue;
        }

        // Colisión Bala -> Bots
        bots.forEach(bot => {
            if (bot.vivo && b.origen !== bot && Math.hypot(bot.x - b.x, bot.y - b.y) < bot.radio) {
                bot.vida -= b.daño;
                balas.splice(i, 1);
                if (bot.vida <= 0) { bot.vivo = false; verificarFinJuego(); }
            }
        });
    }

    // Actualizar Interfaz (UI)
    const vivos = (jugador.vivo ? 1 : 0) + bots.filter(b => b.vivo).length;
    document.getElementById('vivos').innerText = vivos;
    document.getElementById('cubos').innerText = jugador.fuerza;
}

function verificarFinJuego() {
    const botsVivos = bots.filter(b => b.vivo).length;
    if (!jugador.vivo) {
        juegoTerminado = true;
        mensajeFinal = "¡DERROTA! Quedaste eliminado.";
    } else if (botsVivos === 0) {
        juegoTerminado = true;
        mensajeFinal = "¡¡SABOR A VICTORIA!! ¡NÚMERO 1!";
    }
}

// Renderizado de gráficos
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Dibujar Cajas de Fuerza
    cajas.forEach(caja => {
        if (caja.vida > 0) {
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(caja.x, caja.y, caja.tamaño, caja.tamaño);
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.fillText("HP:" + caja.vida, caja.x, caja.y - 5);
        }
    });

    // 2. Dibujar Bots
    bots.forEach(bot => {
        if (!bot.vivo) return;
        ctx.beginPath();
        ctx.arc(bot.x, bot.y, bot.radio, 0, Math.PI * 2);
        ctx.fillStyle = bot.color;
        ctx.fill();
        ctx.closePath();

        // Barra de vida del bot
        ctx.fillStyle = 'red';
        ctx.fillRect(bot.x - 20, bot.y - 35, 40, 6);
        ctx.fillStyle = 'green';
        ctx.fillRect(bot.x - 20, bot.y - 35, (bot.vida / bot.vidaMax) * 40, 6);
    });

    // 3. Dibujar Jugador
    if (jugador.vivo) {
        ctx.beginPath();
        ctx.arc(jugador.x, jugador.y, jugador.radio, 0, Math.PI * 2);
        ctx.fillStyle = jugador.color;
        ctx.fill();
        ctx.closePath();

        // Línea de apuntado estilo Brawl Stars
        const angulo = Math.atan2(raton.y - jugador.y, raton.x - jugador.x);
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 4;
        ctx.moveTo(jugador.x, jugador.y);
        ctx.lineTo(jugador.x + Math.cos(angulo) * 120, jugador.y + Math.sin(angulo) * 120);
        ctx.stroke();

        // Barra de vida del jugador
        ctx.fillStyle = 'red';
        ctx.fillRect(jugador.x - 20, jugador.y - 35, 40, 6);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(jugador.x - 20, jugador.y - 35, (jugador.vida / jugador.vidaMax) * 40, 6);
    }

    // 4. Dibujar Balas
    balas.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#f1c40f';
        ctx.fill();
        ctx.closePath();
    });

    // 5. Dibujar Tormenta (Invertido: Pintamos el exterior del círculo)
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, canvas.width, canvas.height);
    ctx.arc(zona.x, zona.y, Math.max(0, zona.radio), 0, Math.PI * 2, true);
    ctx.fillStyle = 'rgba(155, 89, 182, 0.4)'; // Niebla morada brawler
    ctx.fill();
    ctx.restore();

    // Pantalla de fin de juego
    if (juegoTerminado) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(mensajeFinal, canvas.width / 2, canvas.height / 2);
    }
}

// Bucle principal
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
