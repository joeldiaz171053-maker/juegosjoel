<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl 3D - Three.js Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; text-shadow: 2px 2px 0 #000; }
        canvas { display: block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>Motor 3D Base</h2>
        <p>Usa WASD para moverte.</p>
    </div>

    <script>
        // 1. ESCENA, CÁMARA Y RENDERIZADOR (La trinidad del 3D)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Color cielo del fondo
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100); // Niebla para dar profundidad

        // Cámara en perspectiva (Campo de visión, Proporción, Cerca, Lejos)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Activar sombras
        document.body.appendChild(renderer.domElement);

        // 2. ILUMINACIÓN
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 0.4); // Luz base
        scene.add(luzAmbiente);

        const luzSol = new THREE.DirectionalLight(0xffffff, 0.8);
        luzSol.position.set(20, 40, 20);
        luzSol.castShadow = true;
        luzSol.shadow.camera.left = -20; luzSol.shadow.camera.right = 20;
        luzSol.shadow.camera.top = 20; luzSol.shadow.camera.bottom = -20;
        scene.add(luzSol);

        // 3. ENTORNO (Suelo)
        const geometriaSuelo = new THREE.PlaneGeometry(200, 200);
        const materialSuelo = new THREE.MeshStandardMaterial({ color: 0x2da94f });
        const suelo = new THREE.Mesh(geometriaSuelo, materialSuelo);
        suelo.rotation.x = -Math.PI / 2; // Acostar el plano para que sea piso
        suelo.receiveShadow = true;
        scene.add(suelo);

        // Generar algunos obstáculos 3D aleatorios
        const geometriaMuro = new THREE.BoxGeometry(2, 4, 2);
        const materialMuro = new THREE.MeshStandardMaterial({ color: 0x7f8c8d });
        for(let i=0; i<30; i++) {
            let muro = new THREE.Mesh(geometriaMuro, materialMuro);
            muro.position.set((Math.random() - 0.5) * 80, 2, (Math.random() - 0.5) * 80);
            muro.castShadow = true;
            muro.receiveShadow = true;
            scene.add(muro);
        }

       // 4. JUGADOR (Geometría, Material, Malla)
const geometriaJugador = new THREE.BoxGeometry(1.5, 3, 1.5);
const materialJugador = new THREE.MeshStandardMaterial({ color: 0x3498db });
const jugador = new THREE.Mesh(geometriaJugador, materialJugador);
jugador.position.y = 1.5; 
jugador.castShadow = true;
scene.add(jugador);

// Arma del jugador
const geometriaArma = new THREE.BoxGeometry(0.4, 0.4, 2);
const materialArma = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
const arma = new THREE.Mesh(geometriaArma, materialArma);
arma.position.set(1, 0, -1); // Offset lateral y frontal
arma.castShadow = true;
jugador.add(arma); // Emparentado al jugador
        // Bots (Enemigos)
const bots = [];
const materialBot = new THREE.MeshStandardMaterial({ color: 0xe67e22 });

for(let i=0; i<5; i++) {
    let bot = new THREE.Mesh(geometriaJugador, materialBot);
    bot.position.set((Math.random() - 0.5) * 60, 1.5, (Math.random() - 0.5) * 60);
    bot.castShadow = true;
    
    // Arma del bot
    let armaBot = new THREE.Mesh(geometriaArma, materialArma);
    armaBot.position.set(1, 0, -1);
    bot.add(armaBot);

    scene.add(bot);
    bots.push(bot);
}
        // 5. CONTROLES Y FÍSICAS BÁSICAS
        const teclas = {};
        window.addEventListener('keydown', (e) => teclas[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => teclas[e.key.toLowerCase()] = false);

        const velocidad = 0.2;

        // Ajustar pantalla si se cambia el tamaño de la ventana
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

       // 6. BUCLE DE JUEGO (Game Loop)
function animar() {
    requestAnimationFrame(animar);

    // Movimiento 3D
    if (teclas['w']) jugador.position.z -= velocidad;
    if (teclas['s']) jugador.position.z += velocidad;
    if (teclas['a']) jugador.position.x -= velocidad;
    if (teclas['d']) jugador.position.x += velocidad;

    // Actualización de arma y rotación base del jugador
    if(teclas['w'] || teclas['s'] || teclas['a'] || teclas['d']) {
        // Logica futura para apuntar según movimiento
    }

    // Comportamiento de Bots (Persecución)
    const velocidadBot = 0.04;
    bots.forEach(bot => {
        bot.lookAt(jugador.position);
        let direccion = new THREE.Vector3();
        direccion.subVectors(jugador.position, bot.position).normalize();
        
        // Evitar colapso en el eje Y
        bot.position.x += direccion.x * velocidadBot;
        bot.position.z += direccion.z * velocidadBot;
    });

    // Seguimiento de cámara
    camera.position.x = jugador.position.x;
    camera.position.y = jugador.position.y + 15;
    camera.position.z = jugador.position.z + 15;
    camera.lookAt(jugador.position);

    renderer.render(scene, camera);
}

        animar(); // Iniciar el motor
    </script>
</body>
</html>
