<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Royale - Mapa Gigante</title>
    <style>
        body { margin: 0; background-color: #111; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        #ui { 
            position: absolute; top: 10px; left: 10px; z-index: 5; 
            background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; border: 2px solid #f39c12;
            font-size: 18px; text-transform: uppercase; text-shadow: 2px 2px 0px #000;
        }
        canvas { display: block; background-color: #2da94f; cursor: crosshair; }
        #gameOverScreen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        #victoryText { font-size: 4rem; color: #f1c40f; text-shadow: 0 5px 0 #d35400; margin-bottom: 30px; transform: skewX(-5deg); }
        .btn-menu {
            text-decoration: none; background: linear-gradient(to bottom, #3498db, #2980b9); color: white;
            font-size: 1.8rem; padding: 15px 40px; border-radius: 50px; border: 4px solid #fff; box-shadow: 0 6px 0 #1f4068;
        }
        .btn-menu:active { transform: translateY(4px); box-shadow: 0 2px 0 #1f4068; }
    </style>
</head>
<body>

    <div id="ui">
        Vivos: <span id="vivos">10</span> | Cubos: <span id="cubos">0</span>
        <br><span style="font-size:14px; color:#bdc3c7;">Click: Ataque Normal | Tecla F: ULTI</span>
    </div>

    <div id="gameOverScreen">
        <h1 id="victoryText">¡FIN!</h1>
        <a href="index.html" class="btn-menu">VOLVER AL MENÚ</a>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const mapWidth = 3000;
const mapHeight = 3000;

// Estado del juego
let juegoTerminado = false;
const zona = { x: mapWidth/2, y: mapHeight/2, radio: 1800, vel: 0.3 };

// Clases de personajes
const CLASES = {
    ESCOPETA: 0, // Estilo Shelly
    INFERNO: 1,  // Disparo continuo
    DOBLE_ESCOPETA: 2 // Estilo Bull (Más daño de cerca)
};

const jugador = {
    id: 0, nombre: "Tú", clase: CLASES.ESCOPETA,
    x: 1500, y: 1500, radio: 22, color: '#3498db',
    velocidad: 5, vidaMax: 5000, vida: 5000, fuerza: 0, vivo: true,
    angulo: 0, ultiCarga: 0, ultiMax: 100, enArbusto: false
};

const bots = [];
for(let i=0; i<9; i++) {
    let tipoAzar = Math.floor(Math.random() * 3);
    bots.push({
        id: i+1, nombre: "Bot " + (i+1), clase: tipoAzar,
        x: Math.random() * (mapWidth - 200) + 100, y: Math.random() * (mapHeight - 200) + 100,
        radio: 22, color: tipoAzar === 1 ? '#e67e22' : (tipoAzar === 2 ? '#9b59b6' : '#e74c3c'),
        velocidad: 3.5, vidaMax: 4500, vida: 4500, fuerza: 0, vivo: true,
        ultimoDisparo: 0, angulo: 0, evadiendo: 0, anguloEvasion: 0, enArbusto: false
    });
}

// Entorno
const muros = [];
const arbustos = [];
const cajas = [];

// Generar Mapa (Paredes, Arbustos, Cajas)
for(let i=0; i<40; i++) muros.push({ x: Math.random() * mapWidth, y: Math.random() * mapHeight, w: 100 + Math.random()*150, h: 50 + Math.random()*100 });
for(let i=0; i<60; i++) arbustos.push({ x: Math.random() * mapWidth, y: Math.random() * mapHeight, w: 120, h: 120 });
for(let i=0; i<15; i++) cajas.push({ x: Math.random() * mapWidth, y: Math.random() * mapHeight, tamaño: 40, vida: 3 });

const balas = [];
const teclas = {};
const raton = { x: 0, y: 0 };
let camX = 0, camY = 0;

window.addEventListener('keydown', e => {
    teclas[e.key.toLowerCase()] = true;
    // Disparar Ulti con 'F'
    if(e.key.toLowerCase() === 'f' && jugador.vivo && !juegoTerminado && jugador.ultiCarga >= jugador.ultiMax) {
        let mundoX = raton.x + camX;
        let mundoY = raton.y + camY;
        dispararUlti(jugador, mundoX, mundoY);
        jugador.ultiCarga = 0;
    }
});
window.addEventListener('keyup', e => teclas[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { raton.x = e.clientX; raton.y = e.clientY; });

canvas.addEventListener('mousedown', e => {
    if (e.button === 0 && jugador.vivo && !juegoTerminado) {
        let mundoX = raton.x + camX; let mundoY = raton.y + camY;
        dispararNormal(jugador, mundoX, mundoY);
    }
});

// Colisiones con Muros (Cilindro vs Rectángulo)
function chocaMuro(nx, ny, radio) {
    for(let m of muros) {
        let testX = nx; let testY = ny;
        if (nx < m.x) testX = m.x; else if (nx > m.x + m.w) testX = m.x + m.w;
        if (ny < m.y) testY = m.y; else if (ny > m.y + m.h) testY = m.y + m.h;
        let distX = nx - testX; let distY = ny - testY;
        if (Math.sqrt((distX*distX) + (distY*distY)) <= radio) return true;
    }
    return false;
}

// Lógicas de disparo por clases
function dispararNormal(creador, desX, desY) {
    const angBase = Math.atan2(desY - creador.y, desX - creador.x);
    if(creador.clase === CLASES.ESCOPETA) {
        for(let i=-1; i<=1; i++) crearBala(creador, angBase + (i*0.15), 14, 400, 350, false);
    } else if(creador.clase === CLASES.INFERNO) {
        crearBala(creador, angBase + (Math.random()*0.2 - 0.1), 18, 150, 400, false); // Fuego rápido
    } else if(creador.clase === CLASES.DOBLE_ESCOPETA) {
        for(let i=-2; i<=2; i++) crearBala(creador, angBase + (i*0.1), 16, 350, 250, false);
    }
}

function dispararUlti(creador, desX, desY) {
    const angBase = Math.atan2(desY - creador.y, desX - creador.x);
    // Súper tipo Shelly (Gigante y rompe muros - simplificado a más daño y distancia)
    for(let i=-4; i<=4; i++) crearBala(creador, angBase + (i*0.12), 20, 800, 500, true);
}

function crearBala(origen, angulo, vel, dmgBase, dist, esUlti) {
    balas.push({
        x: origen.x, y: origen.y, vx: Math.cos(angulo)*vel, vy: Math.sin(angulo)*vel,
        daño: dmgBase + (origen.fuerza * 100), origen: origen,
        distMax: dist, distRec: 0, esUlti: esUlti
    });
}

function update() {
    if (juegoTerminado) return;

    // Actualizar Cámara (Sigue al jugador)
    camX = jugador.x - canvas.width / 2;
    camY = jugador.y - canvas.height / 2;
    camX = Math.max(0, Math.min(camX, mapWidth - canvas.width));
    camY = Math.max(0, Math.min(camY, mapHeight - canvas.height));

    // Movimiento Jugador
    if (jugador.vivo) {
        let nx = jugador.x, ny = jugador.y;
        if (teclas['w']) ny -= jugador.velocidad;
        if (teclas['s']) ny += jugador.velocidad;
        if (teclas['a']) nx -= jugador.velocidad;
        if (teclas['d']) nx += jugador.velocidad;
        
        // Limites de mapa y muros
        nx = Math.max(jugador.radio, Math.min(nx, mapWidth - jugador.radio));
        ny = Math.max(jugador.radio, Math.min(ny, mapHeight - jugador.radio));
        
        if (!chocaMuro(nx, jugador.y, jugador.radio)) jugador.x = nx;
        if (!chocaMuro(jugador.x, ny, jugador.radio)) jugador.y = ny;

        jugador.angulo = Math.atan2((raton.y + camY) - jugador.y, (raton.x + camX) - jugador.x);
        if (Math.hypot(jugador.x - zona.x, jugador.y - zona.y) > zona.radio) jugador.vida -= 10;
        
        // Comprobar si está en arbusto
        jugador.enArbusto = arbustos.some(a => jugador.x > a.x && jugador.x < a.x+a.w && jugador.y > a.y && jugador.y < a.y+a.h);
        
        if (jugador.vida <= 0) { jugador.vivo = false; verificarFinJuego(); }
    }

    if (zona.radio > 0) zona.radio -= zona.vel;

    // IA Avanzada de Bots (Autonomía, Evasión y Clases)
    bots.forEach(bot => {
        if (!bot.vivo) return;

        let objetivo = null; let menorDist = Infinity;
        let rivales = bots.filter(b => b.vivo && b.id !== bot.id);
        if (jugador.vivo && !jugador.enArbusto) rivales.push(jugador);

        rivales.forEach(r => {
            let dist = Math.hypot(r.x - bot.x, r.y - bot.y);
            if (dist < menorDist) { menorDist = dist; objetivo = r; }
        });

        let movX = bot.x, movY = bot.y;
        bot.enArbusto = arbustos.some(a => bot.x > a.x && bot.x < a.x+a.w && bot.y > a.y && bot.y < a.y+a.h);

        if (bot.evadiendo > 0) {
            // Rutina de escape de muros
            movX += Math.cos(bot.anguloEvasion) * bot.velocidad;
            movY += Math.sin(bot.anguloEvasion) * bot.velocidad;
            bot.evadiendo--;
        } else {
            let distAlCentro = Math.hypot(bot.x - zona.x, bot.y - zona.y);
            if (distAlCentro > zona.radio - 100) {
                bot.angulo = Math.atan2(zona.y - bot.y, zona.x - bot.x);
                movX += Math.cos(bot.angulo) * bot.velocidad;
                movY += Math.sin(bot.angulo) * bot.velocidad;
            } else if (objetivo && menorDist < 450) {
                bot.angulo = Math.atan2(objetivo.y - bot.y, objetivo.x - bot.x);
                if (menorDist > 200) {
                    movX += Math.cos(bot.angulo) * bot.velocidad;
                    movY += Math.sin(bot.angulo) * bot.velocidad;
                }
                
                let cooldown = bot.clase === CLASES.INFERNO ? 150 : 1500;
                let ahora = Date.now();
                if (ahora - bot.ultimoDisparo > cooldown) {
                    dispararNormal(bot, objetivo.x, objetivo.y);
                    bot.ultimoDisparo = ahora;
                }
            }
        }

        // Aplicar colisión a bots
        if (!chocaMuro(movX, bot.y, bot.radio)) bot.x = movX; 
        else { bot.evadiendo = 40; bot.anguloEvasion = bot.angulo + (Math.random() > 0.5 ? 1.5 : -1.5); }
        if (!chocaMuro(bot.x, movY, bot.radio)) bot.y = movY;
        else { bot.evadiendo = 40; bot.anguloEvasion = bot.angulo + (Math.random() > 0.5 ? 1.5 : -1.5); }

        if (Math.hypot(bot.x - zona.x, bot.y - zona.y) > zona.radio) bot.vida -= 10;
        if (bot.vida <= 0) { bot.vivo = false; verificarFinJuego(); }
    });

    // Balas
    for (let i = balas.length - 1; i >= 0; i--) {
        let b = balas[i];
        b.x += b.vx; b.y += b.vy;
        b.distRec += Math.hypot(b.vx, b.vy);

        if (b.distRec > b.distMax || chocaMuro(b.x, b.y, 5)) { balas.splice(i, 1); continue; }

        cajas.forEach(c => {
            if (c.vida > 0 && b.x > c.x && b.x < c.x+c.tamaño && b.y > c.y && b.y < c.y+c.tamaño) {
                c.vida--; balas.splice(i, 1);
                if (c.vida <= 0) { b.origen.fuerza++; b.origen.vidaMax += 500; b.origen.vida = b.origen.vidaMax; }
            }
        });

        let todos = [...bots]; if(jugador.vivo) todos.push(jugador);
        for(let j=0; j<todos.length; j++) {
            let t = todos[j];
            if (t.vivo && b.origen.id !== t.id && Math.hypot(t.x - b.x, t.y - b.y) < t.radio) {
                t.vida -= b.daño; balas.splice(i, 1);
                if (b.origen.id === 0 && jugador.vivo) jugador.ultiCarga = Math.min(jugador.ultiMax, jugador.ultiCarga + (b.origen.clase === CLASES.INFERNO ? 2 : 12));
                if (t.vida <= 0) { t.vivo = false; verificarFinJuego(); }
                break;
            }
        }
    }
    document.getElementById('vivos').innerText = (jugador.vivo?1:0) + bots.filter(b=>b.vivo).length;
    document.getElementById('cubos').innerText = jugador.fuerza;
}

// --- RENDERIZADO 2.5D ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-camX, -camY); // Desplazar mundo según la cámara

    // Rejilla de césped
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    for(let i=0; i<mapWidth; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,mapHeight); ctx.stroke(); }
    for(let i=0; i<mapHeight; i+=100) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(mapWidth,i); ctx.stroke(); }

    // Muros 2.5D (Base oscura, Tapa clara)
    muros.forEach(m => {
        ctx.fillStyle = '#555'; ctx.fillRect(m.x, m.y, m.w, m.h); // Base
        ctx.fillStyle = '#7f8c8d'; ctx.fillRect(m.x, m.y - 40, m.w, m.h); // Cima
        ctx.fillStyle = '#666'; ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x, m.y-40); ctx.lineTo(m.x+m.w, m.y-40); ctx.lineTo(m.x+m.w, m.y); ctx.fill();
    });

    cajas.forEach(c => {
        if(c.vida>0) {
            ctx.fillStyle = '#e67e22'; ctx.fillRect(c.x, c.y - 10, c.tamaño, c.tamaño);
            ctx.fillStyle = '#d35400'; ctx.fillRect(c.x, c.y, c.tamaño, c.tamaño);
            ctx.fillStyle = '#fff'; ctx.font='12px Arial'; ctx.fillText("HP:"+c.vida, c.x, c.y-15);
        }
    });

    // Arbustos (Fondo)
    arbustos.forEach(a => { ctx.fillStyle = 'rgba(39, 174, 96, 0.7)'; ctx.fillRect(a.x, a.y, a.w, a.h); });

    let entidades = [...bots]; if(jugador.vivo) entidades.push(jugador);
    // Ordenar por Y para pintar los que están "abajo" frente a los que están "arriba" (Efecto 2.5D)
    entidades.sort((a,b) => a.y - b.y).forEach(ent => {
        if(!ent.vivo) return;
        // Si el enemigo está en el arbusto y tú no, no lo dibujes
        if(ent.id !== 0 && ent.enArbusto && !jugador.enArbusto) return;
        
        ctx.save(); ctx.translate(ent.x, ent.y);
        
        // Sombra
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0, 15, ent.radio, ent.radio/2, 0, 0, Math.PI*2); ctx.fill();

        ctx.rotate(ent.angulo);
        // Cuerpo
        ctx.fillStyle = ent.color; ctx.beginPath(); ctx.arc(0, 0, ent.radio, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        // Arma
        ctx.fillStyle = '#333'; ctx.fillRect(0, -6, ent.radio+15, 12);
        
        ctx.restore();

        // UI por encima del personaje
        ctx.fillStyle = 'white'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
        ctx.fillText((ent.fuerza>0?"["+ent.fuerza+"] ":"")+ent.nombre, ent.x, ent.y - 45);
        // Vida
        ctx.fillStyle = '#111'; ctx.fillRect(ent.x-20, ent.y-38, 40, 6);
        ctx.fillStyle = ent.id === 0 ? '#2ecc71' : '#e74c3c'; ctx.fillRect(ent.x-20, ent.y-38, (ent.vida/ent.vidaMax)*40, 6);
        
        // BARRITA DE ULTI ARRIBA (Solo para ti)
        if(ent.id === 0) {
            ctx.fillStyle = '#111'; ctx.fillRect(ent.x-20, ent.y-30, 40, 4);
            ctx.fillStyle = ent.ultiCarga >= ent.ultiMax ? '#f1c40f' : '#f39c12';
            ctx.fillRect(ent.x-20, ent.y-30, (ent.ultiCarga/ent.ultiMax)*40, 4);
            
            // Guía láser
            ctx.strokeStyle = ent.ultiCarga >= ent.ultiMax ? 'rgba(241,196,15,0.4)' : 'rgba(255,255,255,0.2)';
            ctx.lineWidth = ent.ultiCarga >= ent.ultiMax ? 8 : 2;
            ctx.beginPath(); ctx.moveTo(ent.x, ent.y); ctx.lineTo(ent.x+Math.cos(ent.angulo)*200, ent.y+Math.sin(ent.angulo)*200); ctx.stroke();
        }
    });

    balas.forEach(b => {
        ctx.fillStyle = b.esUlti ? '#f1c40f' : '#fff';
        ctx.beginPath(); ctx.arc(b.x, b.y, b.esUlti?12:5, 0, Math.PI*2); ctx.fill();
    });

    // Arbustos (Tope para ocultar personajes)
    arbustos.forEach(a => { ctx.fillStyle = 'rgba(46, 204, 113, 0.4)'; ctx.fillRect(a.x+5, a.y-10, a.w-10, a.h); });

    // Tormenta
    ctx.beginPath(); ctx.rect(0,0,mapWidth,mapHeight); ctx.arc(zona.x, zona.y, Math.max(0,zona.radio), 0, Math.PI*2, true);
    ctx.fillStyle = 'rgba(155, 89, 182, 0.5)'; ctx.fill();

    ctx.restore();
}

function verificarFinJuego() {
    let vivos = bots.filter(b=>b.vivo).length;
    if(!jugador.vivo || vivos === 0) {
        juegoTerminado = true;
        document.getElementById('victoryText').innerText = jugador.vivo ? "¡VICTORIA!" : "¡ELIMINADO!";
        document.getElementById('victoryText').style.color = jugador.vivo ? "#f1c40f" : "#e74c3c";
        document.getElementById('gameOverScreen').style.display = "flex";
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
