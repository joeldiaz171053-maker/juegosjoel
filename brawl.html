<div id="screen-inventory" class="pantalla glass-panel oculto">
    <div class="menu-contenedor">
        <h2>Inventario y Personalización</h2>
        <div style="display:flex; gap:20px;">
            <div style="flex:1;">
                <h3>Personajes</h3>
                <div id="list-chars" class="grid-tienda"></div>
            </div>
            <div style="flex:1;">
                <h3>Skins de Arma</h3>
                <div id="list-skins" class="grid-tienda"></div>
            </div>
        </div>
        <button class="btn" onclick="document.getElementById('screen-inventory').classList.add('oculto')">Volver</button>
    </div>
</div>

<script type="module">
    // --- LÓGICA DE GESTIÓN DE RONDAS Y BOOTIN ---
    const Match = {
        maxRounds: 9,
        currentRound: 1,
        isBuyingPhase: true,
        
        // Reinicio de partida
        resetRound() {
            this.currentRound++;
            G.hp = 100;
            G.ammo = ARMAS[G.weaponIdx].max;
            
            // Reubicar jugadores en puntos de spawn
            playerObj.position.set(G.team === 'T' ? -120 : 120, 0, 0);
            
            // Generar botín (Vida extra/Munición)
            spawnLoot();
            
            if(this.currentRound > this.maxRounds) endMatch();
        }
    };

    function spawnLoot() {
        // Lógica de texturizado y loot
        const lootTypes = ['MEDKIT', 'AMMO'];
        lootTypes.forEach(type => {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(2,2,2), 
                new THREE.MeshStandardMaterial({ 
                    map: new THREE.TextureLoader().load('https://threejs.org/examples/textures/crate.gif') // Ejemplo de textura
                })
            );
            mesh.position.set((Math.random()-0.5)*150, 1, (Math.random()-0.5)*150);
            scene.add(mesh);
        });
    }

    // --- INTERFAZ DE TIENDA Y SKINS ---
    const Inventory = {
        chars: [{id:0, name:'Operador Alpha', skin:'basic'}, {id:1, name:'Ghost Unit', skin:'stealth'}],
        skins: [{id:0, name:'Classic', color:0xffffff}, {id:1, name:'Neon', color:0x00ff00}],
        
        init() {
            const cList = document.getElementById('list-chars');
            this.chars.forEach(c => {
                const b = document.createElement('button');
                b.className = 'item-tienda';
                b.innerText = c.name;
                b.onclick = () => alert('Personaje equipado: ' + c.name);
                cList.appendChild(b);
            });
        }
    };
    Inventory.init();
</script>
