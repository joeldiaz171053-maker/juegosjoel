<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TecnoTrade Brawl 3D - Advanced Edition</title>
    <style>
        /* Estética Minimalista Premium (Glassmorphism) */
        body { margin: 0; overflow: hidden; background-color: #0b0c10; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; user-select: none; touch-action: none; }
        .glass-panel { background: rgba(15, 15, 20, 0.75); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6); color: #f5f5f7; }
        
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; padding: 20px; display: none; width: 260px; }
        h2 { margin: 0 0 10px 0; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.5px; background: linear-gradient(90deg, #fff, #a1a1a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bar-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        #hp-bar { width: 100%; height: 100%; background: #2997ff; transition: width 0.3s cubic-bezier(0.25, 0.1, 0.25, 1); box-shadow: 0 0 12px rgba(41,151,255,0.5); }
        .stats { font-size: 0.85rem; color: #a1a1a6; margin: 6px 0; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
        .stats span { color: #f5f5f7; font-weight: 600; font-variant-numeric: tabular-nums; }
        #zone-warning { color: #ff3b30; display: none; font-weight: 700; animation: pulse 1s infinite; margin-top: 15px; text-align: center; font-size: 0.85rem; letter-spacing: 1px; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; text-shadow: 0 0 10px rgba(255,59,48,0.6); } 50% { opacity: 0.4; } }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #ffffff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; display: none; box-shadow: 0 0 6px rgba(255,255,255,0.8); }
        
        .pantalla { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; background: radial-gradient(circle at center, rgba(30,30,35,0.95) 0%, #000 100%); }
        .oculto { opacity: 0; pointer-events: none; display: none !important; }
        .menu-contenedor { padding: 30px; width: 80%; max-width: 900px; max-height: 85vh; overflow-y: auto; scrollbar-width: none; }
        .menu-contenedor::-webkit-scrollbar { display: none; }
        .menu-contenedor h1 { font-size: 2.5rem; margin-bottom: 5px; text-align: center; background: linear-gradient(135deg, #ffffff, #86868b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn { background: #f5f5f7; color: #1d1d1f; border: none; padding: 12px 24px; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 20px; width: 100%; }
        .btn:hover { background: #ffffff; box-shadow: 0 8px 24px rgba(255,255,255,0.2); transform: translateY(-2px); }
        
        .grid-tienda { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 15px 0; }
        .item-tienda { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; position: relative; }
        .item-tienda:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }
        .item-tienda.activo { border-color: #2997ff; background: rgba(41,151,255,0.08); }
        .item-tienda.bloqueado { opacity: 0.5; filter: grayscale(100%); cursor: not-allowed; }
        .tag-req { position: absolute; top: 5px; right: 5px; font-size: 0.65rem; background: #ff3b30; padding: 2px 6px; border-radius: 4px; }
        
        /* Controles Móviles */
        #mobile-controls { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; display: none; }
        .joy-zone { position: absolute; bottom: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joy-move { left: 40px; }
        #joy-aim { right: 40px; }
        .joy-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        .btn-action { position: absolute; pointer-events: auto; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; border: 1px solid rgba(255,255,255,0.5); }
        #btn-vehiculo { bottom: 180px; right: 40px; width: 60px; height: 60px; font-size: 0.8rem; }
        #btn-aliado { bottom: 250px; right: 40px; width: 60px; height: 60px; font-size: 0.8rem; }

        canvas { display: block; outline: none; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
</head>
<body>
    <div id="ui" class="glass-panel">
        <h2>TecnoTrade</h2>
        <div class="bar-container"><div id="hp-bar"></div></div>
        <div class="stats">Salud <span><span id="hp-text">100</span>%</span></div>
        <div class="stats">Munición <span id="ammo-text">∞</span></div>
        <div class="stats">Vivos <span id="alive-text">6</span></div>
        <div class="stats">Tokens <span id="monedas-text" style="color:#ff9f0a">0</span></div>
        <div class="stats" style="margin-top:15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:10px;">
            Nivel <span id="nivel-text" style="color:#34c759">1</span>
        </div>
        <div class="bar-container" style="height: 4px; margin-bottom: 0;"><div id="xp-bar" style="background: #34c759;"></div></div>
        <p id="zone-warning">SALIENDO DEL ÁREA SEGURA</p>
    </div>
    
    <div id="crosshair"></div>

    <div id="mobile-controls">
        <div id="joy-move" class="joy-zone"><div class="joy-stick" id="stick-move"></div></div>
        <div id="joy-aim" class="joy-zone"><div class="joy-stick" id="stick-aim"></div></div>
        <div id="btn-vehiculo" class="btn-action">HELI</div>
        <div id="btn-aliado" class="btn-action">AYUDA</div>
    </div>

    <div id="pantalla-inicio" class="pantalla glass-panel" style="border-radius: 0; border: none;">
        <div class="menu-contenedor glass-panel">
            <h1>TecnoTrade BRAWL</h1>
            <div style="display: flex; justify-content: space-around; margin-bottom: 20px;">
                <p style="color: #ff9f0a; font-weight: 600;">Tokens: <span id="menu-monedas">0</span></p>
                <p style="color: #34c759; font-weight: 600;">Nivel: <span id="menu-nivel">1</span></p>
            </div>
            
            <h3 style="color: #f5f5f7;">Operadores (Skins)</h3>
            <div class="grid-tienda" id="grid-personajes"></div>
            
            <h3 style="color: #f5f5f7;">Armamento Táctico</h3>
            <div class="grid-tienda" id="grid-armas"></div>
            
            <button class="btn" id="btn-jugar">DESPLEGAR AL COMBATE</button>
        </div>
    </div>

    <div id="pantalla-fin" class="pantalla glass-panel oculto" style="border-radius: 0; border: none;">
        <div class="menu-contenedor glass-panel" style="text-align: center; max-width: 400px;">
            <h1 style="color: #ff3b30; -webkit-text-fill-color: initial;">FIN DE PARTIDA</h1>
            <p style="font-size: 1.2rem; color: #a1a1a6;">Clasificación: <span id="posicion-final" style="color: #f5f5f7;">#0</span></p>
            <p style="font-size: 1.2rem; color: #ff9f0a;">Tokens: +<span id="monedas-ganadas">0</span></p>
            <p style="font-size: 1.2rem; color: #34c759;">XP: +<span id="xp-ganada">0</span></p>
            <button class="btn" id="btn-volver" style="background: #1d1d1f; color: #fff;">VOLVER A BASE</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // SISTEMA DE AUDIO
        // ==========================================
        let audioCtx = null;
        function initAudio() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playSonido(tipo) {
            if(!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if(tipo === 'disparo') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (tipo === 'melee') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (tipo === 'recarga') {
                osc.type = 'square'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // ==========================================
        // ESTADOS Y PROGRESIÓN (NIVELES)
        // ==========================================
        let monedasGlobales = 0, nivelGlobal = 1, xpGlobal = 0, unlocks = [0, 100];
        try {
            monedasGlobales = parseInt(localStorage.getItem('tt_coins')) || 0;
            nivelGlobal = parseInt(localStorage.getItem('tt_nivel')) || 1;
            xpGlobal = parseInt(localStorage.getItem('tt_xp')) || 0;
            const u = localStorage.getItem('tt_unlocks');
            if(u) unlocks = JSON.parse(u);
        } catch(e) {}

        function requerimientoXP(n) { return Math.floor(100 * Math.pow(n, 1.5)); }
        
        function agregarXP(cantidad) {
            xpGlobal += cantidad;
            let req = requerimientoXP(nivelGlobal);
            while(xpGlobal >= req) {
                xpGlobal -= req;
                nivelGlobal++;
                req = requerimientoXP(nivelGlobal);
            }
            try {
                localStorage.setItem('tt_nivel', nivelGlobal);
                localStorage.setItem('tt_xp', xpGlobal);
            } catch(e) {}
            actualizarUI();
        }

        // ==========================================
        // CATÁLOGO EXTENDIDO (20 Skins, 10 Armas)
        // ==========================================
        const DATOS = {
            personajes: [
                { id: 0, n: 'Recluta', c: 0x8e8e93, t: 'bipedo', p: 0, nv: 1 },
                { id: 1, n: 'Táctico', c: 0x1c1c1e, t: 'policia', p: 100, nv: 2 },
                { id: 2, n: 'Dron Básico', c: 0xf5f5f7, t: 'dron', p: 250, nv: 3 },
                { id: 3, n: 'Desértico', c: 0xc2b280, t: 'bipedo', p: 300, nv: 4 },
                { id: 4, n: 'Infiltrador', c: 0x000000, t: 'policia', p: 500, nv: 5 },
                { id: 5, n: 'Liquid Glass', c: 0xaaaaaa, t: 'bipedo', p: 800, nv: 6 }, // Preferencia de usuario
                { id: 6, n: 'Dron Combate', c: 0xff3b30, t: 'dron', p: 1000, nv: 7 },
                { id: 7, n: 'Ártico', c: 0xe0e0e0, t: 'bipedo', p: 1200, nv: 8 },
                { id: 8, n: 'Mercenario', c: 0x4a4a4a, t: 'bipedo', p: 1500, nv: 9 },
                { id: 9, n: 'Cyborg', c: 0x00ffcc, t: 'policia', p: 2000, nv: 10 },
                { id: 10, n: 'Dron Stealth', c: 0x111111, t: 'dron', p: 2500, nv: 12 },
                { id: 11, n: 'Heavy', c: 0x556b2f, t: 'bipedo', p: 3000, nv: 14 },
                { id: 12, n: 'Sniper', c: 0x8b4513, t: 'bipedo', p: 3500, nv: 16 },
                { id: 13, n: 'Mac-Bot', c: 0xffffff, t: 'policia', p: 4000, nv: 18 },
                { id: 14, n: 'Dron Plasma', c: 0xff00ff, t: 'dron', p: 5000, nv: 20 },
                { id: 15, n: 'Espectro', c: 0x2c3e50, t: 'bipedo', p: 6000, nv: 22 },
                { id: 16, n: 'Titanio', c: 0xbdc3c7, t: 'bipedo', p: 7000, nv: 25 },
                { id: 17, n: 'S.W.A.T.', c: 0x001f3f, t: 'policia', p: 8000, nv: 28 },
                { id: 18, n: 'Dron Oro', c: 0xffd700, t: 'dron', p: 10000, nv: 30 },
                { id: 19, n: 'TecnoTrade Leyenda', c: 0x2997ff, t: 'policia', p: 15000, nv: 35 }
            ],
            armas: [
                { id: 100, n: 'Karambit', cd: 35, dmg: 55, vel: 0, bal: 1, sp: 0, au: false, max: Infinity, ml: true, p: 0, nv: 1 },
                { id: 101, n: 'Glock 19', cd: 15, dmg: 20, vel: 3.5, bal: 1, sp: 0.02, au: false, max: 30, ml: false, p: 100, nv: 2 },
                { id: 102, n: 'MP40', cd: 8, dmg: 12, vel: 4.0, bal: 1, sp: 0.08, au: true, max: 60, ml: false, p: 300, nv: 4 },
                { id: 103, n: 'Remington', cd: 45, dmg: 10, vel: 3.0, bal: 8, sp: 0.2, au: false, max: 16, ml: false, p: 600, nv: 6 },
                { id: 104, n: 'AK-47', cd: 9, dmg: 22, vel: 4.5, bal: 1, sp: 0.05, au: true, max: 90, ml: false, p: 1000, nv: 10 },
                { id: 105, n: 'Deagle', cd: 30, dmg: 45, vel: 4.0, bal: 1, sp: 0.01, au: false, max: 21, ml: false, p: 1500, nv: 15 },
                { id: 106, n: 'M4A1', cd: 7, dmg: 18, vel: 5.0, bal: 1, sp: 0.04, au: true, max: 120, ml: false, p: 2500, nv: 20 },
                { id: 107, n: 'AWP Sniper', cd: 80, dmg: 100, vel: 8.0, bal: 1, sp: 0, au: false, max: 10, ml: false, p: 4000, nv: 25 },
                { id: 108, n: 'Minigun', cd: 3, dmg: 8, vel: 3.0, bal: 1, sp: 0.15, au: true, max: 300, ml: false, p: 7000, nv: 30 },
                { id: 109, n: 'Cañón Plasma', cd: 50, dmg: 80, vel: 2.0, bal: 1, sp: 0, au: false, max: 5, ml: false, p: 12000, nv: 35 }
            ]
        };

        let selPersonaje = 0, selArma = 1, disparando = false, estadoJuego = 'MENU', isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        const gameState = {
            jugador: { mesh: null, armaMesh: null, hp: 100, maxHp: 100, speed: 0.45, vivo: false, cd: 0, ammo: 0 },
            bots: [], aliados: [], proyectiles: [], particulas: [], vehiculos: [], drops: [], stats: { kills: 0 }
        };

        // ==========================================
        // MOTOR 3D Y MAPA
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        scene.fog = new THREE.FogExp2(0x0a0a0c, 0.008);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x1d1d1f, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(100, 200, 50); dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048; dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 400;
        dirLight.shadow.camera.left = -200; dirLight.shadow.camera.right = 200;
        dirLight.shadow.camera.top = 200; dirLight.shadow.camera.bottom = -200;
        scene.add(dirLight);

        // Geometría Instanciada / Mapa Procedural
        const mapaSize = 400;
        const suelo = new THREE.Mesh(new THREE.PlaneGeometry(mapaSize, mapaSize), new THREE.MeshStandardMaterial({ color: 0x1c1c1e, roughness: 0.9 }));
        suelo.rotation.x = -Math.PI / 2; suelo.receiveShadow = true;
        scene.add(suelo);

        const obstaculos = [];
        function generarCiudad() {
            const geoEdificio = new THREE.BoxGeometry(1, 1, 1);
            const matEdificio = new THREE.MeshStandardMaterial({ color: 0x2c2c2e, roughness: 0.7 });
            const instancedMesh = new THREE.InstancedMesh(geoEdificio, matEdificio, 150);
            instancedMesh.castShadow = true; instancedMesh.receiveShadow = true;
            
            const dummy = new THREE.Object3D();
            for(let i=0; i<150; i++) {
                const w = 4 + Math.random() * 8, h = 10 + Math.random() * 30, d = 4 + Math.random() * 8;
                const px = (Math.random() - 0.5) * (mapaSize - 40), pz = (Math.random() - 0.5) * (mapaSize - 40);
                dummy.position.set(px, h/2, pz);
                dummy.scale.set(w, h, d);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
                obstaculos.push({ box: new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(px, h/2, pz), new THREE.Vector3(w, h, d)) });
            }
            scene.add(instancedMesh);
        }
        generarCiudad();

        let meshZona;
        let zoneData = { radio: 200, x: 0, z: 0, dps: 10, shrinkSpeed: 0.05 };
        
        function limpiarArr(arr) { arr.forEach(e => { if(e.mesh) scene.remove(e.mesh); }); arr.length = 0; }

        function inicializarPartida() {
            if(meshZona) scene.remove(meshZona);
            zoneData = { radio: 200, x: 0, z: 0, dps: 10, shrinkSpeed: 0.05 };
            meshZona = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 100, 64, 1, true), new THREE.MeshBasicMaterial({ color: 0xff3b30, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
            meshZona.position.y = 50; meshZona.scale.set(zoneData.radio, 1, zoneData.radio);
            scene.add(meshZona);

            limpiarArr(gameState.proyectiles); limpiarArr(gameState.particulas); limpiarArr(gameState.drops); limpiarArr(gameState.aliados); limpiarArr(gameState.vehiculos);
            for(let i=0; i<30; i++) spawnAmmoDrop();
            spawnHelicoptero(new THREE.Vector3(10, 0, 10)); // Vehículo
        }

        // ==========================================
        // ENTIDADES Y HITBOXES (AABB)
        // ==========================================
        function construirModelo(datosP) {
            const grupo = new THREE.Group();
            const matC = new THREE.MeshStandardMaterial({ color: datosP.c, roughness: 0.3, metalness: 0.5 });
            if(datosP.t === 'dron') {
                const n = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), matC);
                const matA = new THREE.MeshStandardMaterial({color: 0x111});
                const a1 = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.1, 0.2), matA), a2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 2.5), matA);
                a1.position.y = a2.position.y = 0.5; n.castShadow = a1.castShadow = a2.castShadow = true;
                grupo.add(n, a1, a2); grupo.userData = { t: 'dron', aspas: [a1, a2], off: Math.random() * Math.PI };
            } else {
                const c = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.8), matC); c.position.y = 0.75;
                const h = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), matC); h.position.y = 1.85;
                c.castShadow = h.castShadow = true; grupo.add(c, h);
                if(datosP.t === 'policia') {
                    const l1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.4), new THREE.MeshBasicMaterial({color: 0xff3b30}));
                    const l2 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.4), new THREE.MeshBasicMaterial({color: 0x007aff}));
                    l1.position.set(-0.25, 2.25, 0); l2.position.set(0.25, 2.25, 0); grupo.add(l1, l2);
                }
                grupo.userData = { t: 'bipedo', off: Math.random() * Math.PI };
            }
            return grupo;
        }

        function crearArmaMesh(armaData) {
            const grp = new THREE.Group(), mat = new THREE.MeshStandardMaterial({ color: 0x333 });
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, armaData.ml ? 0.6 : 1.2), mat);
            m.position.set(0.6, 1.2, -0.5); m.castShadow = true; grp.add(m); return grp;
        }

        function spawnHelicoptero(pos) {
            const hGrp = new THREE.Group();
            const chasis = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 5), new THREE.MeshStandardMaterial({color: 0x1d1d1f, roughness:0.2}));
            const cola = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 4), new THREE.MeshStandardMaterial({color: 0x1d1d1f}));
            cola.position.set(0, 0.5, 4.5);
            const rotorM = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 8), new THREE.MeshStandardMaterial({color: 0x888}));
            rotorM.position.y = 1.2;
            chasis.castShadow = true; hGrp.add(chasis, cola, rotorM); hGrp.position.copy(pos); scene.add(hGrp);
            gameState.vehiculos.push({ mesh: hGrp, rotor: rotorM, vel: new THREE.Vector3(0,0,0), piloto: false });
        }

        function reclutarAliado() {
            if(monedasGlobales < 200) return;
            monedasGlobales -= 200; actualizarUI();
            let m = construirModelo(DATOS.personajes[0]);
            m.traverse(c => { if(c.isMesh) c.material = new THREE.MeshStandardMaterial({ color: 0x34c759 }); });
            m.position.copy(gameState.jugador.mesh.position).add(new THREE.Vector3(2,0,2));
            let a = crearArmaMesh(DATOS.armas[2]); m.add(a); scene.add(m);
            gameState.aliados.push({ mesh: m, armaMesh: a, hp: 100, speed: 0.35, cd: 0, armaIdx: 2, obj: null });
        }

        function spawnAmmoDrop() {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x34c759, emissive: 0x114422 }));
            m.position.set((Math.random()-0.5)*(mapaSize-20), 0.4, (Math.random()-0.5)*(mapaSize-20));
            scene.add(m); gameState.drops.push({ mesh: m, box: new THREE.Box3() });
        }

        function spawnJugador() {
            if(gameState.jugador.mesh) scene.remove(gameState.jugador.mesh);
            const dP = DATOS.personajes[selPersonaje], dA = DATOS.armas[selArma];
            gameState.jugador.mesh = construirModelo(dP); gameState.jugador.armaMesh = crearArmaMesh(dA);
            gameState.jugador.mesh.add(gameState.jugador.armaMesh);
            gameState.jugador.mesh.position.set(0, 0, 0); gameState.jugador.hp = 100; gameState.jugador.vivo = true;
            gameState.jugador.ammo = dA.max; gameState.stats.kills = 0;
            scene.add(gameState.jugador.mesh);
        }

        function spawnBots(cant) {
            limpiarArr(gameState.bots);
            for(let i=0; i<cant; i++) {
                const bP = DATOS.personajes[Math.floor(Math.random()*DATOS.personajes.length)], bAIdx = Math.floor(Math.random()*DATOS.armas.length);
                let m = construirModelo(bP); m.traverse(c => { if(c.isMesh && c.material.color.getHex()!==0x2997ff) c.material = new THREE.MeshStandardMaterial({ color: 0xff3b30 }); });
                let a = crearArmaMesh(DATOS.armas[bAIdx]); m.add(a);
                m.position.set((Math.random()-0.5)*mapaSize*0.8, 0, (Math.random()-0.5)*mapaSize*0.8); scene.add(m);
                gameState.bots.push({ mesh: m, armaMesh: a, hp: 80, speed: 0.15 + Math.random()*0.15, cd: 0, armaIdx: bAIdx, box: new THREE.Box3() });
            }
        }

        // ==========================================
        // SISTEMA DE COMBATE (Balística y AABB)
        // ==========================================
        const geoBala = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 4); geoBala.rotateX(Math.PI/2);
        const matBala = new THREE.MeshBasicMaterial({ color: 0xffcc00 });

        function ejecutarDisparo(orig, armM, esJugador, aStats) {
            if(esJugador) {
                if(gameState.jugador.ammo <= 0 && !aStats.ml) { playSonido('recarga'); return; }
                if(!aStats.ml) gameState.jugador.ammo--;
            }
            playSonido(aStats.ml ? 'melee' : 'disparo');
            armM.children[0].position.z += aStats.ml ? -0.8 : 0.4;
            
            if(esJugador && !aStats.ml) { document.getElementById('crosshair').classList.add('active'); setTimeout(()=>document.getElementById('crosshair').classList.remove('active'), 50); }

            if(aStats.ml) {
                const hitBox = new THREE.Box3().setFromCenterAndSize(orig.position.clone().add(new THREE.Vector3(0,0,2).applyQuaternion(orig.quaternion)), new THREE.Vector3(4,4,4));
                if(esJugador || esJugador === -2 /* Aliado */) {
                    gameState.bots.forEach((b, i) => {
                        b.box.setFromObject(b.mesh);
                        if(b.box.intersectsBox(hitBox)) darDanoBot(i, aStats.dmg, esJugador);
                    });
                } else if (gameState.jugador.vivo && new THREE.Box3().setFromObject(gameState.jugador.mesh).intersectsBox(hitBox)) {
                    gameState.jugador.hp -= aStats.dmg;
                }
            } else {
                for(let i=0; i<aStats.bal; i++) {
                    const b = new THREE.Mesh(geoBala, matBala);
                    const dir = new THREE.Vector3(0,0,1).applyQuaternion(orig.quaternion);
                    dir.x += (Math.random()-0.5)*aStats.sp; dir.y += (Math.random()-0.5)*aStats.sp; dir.z += (Math.random()-0.5)*aStats.sp; dir.normalize();
                    b.position.copy(orig.position); b.position.y += 1.2; b.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), dir);
                    scene.add(b); gameState.proyectiles.push({ mesh: b, dir: dir, spd: aStats.vel, vida: 100, esJ: esJugador, dmg: aStats.dmg, box: new THREE.Box3() });
                }
            }
            if(esJugador === true) actualizarUI();
        }

        function crearImpacto(pos, color = 0xffcc00) {
            const geo = new THREE.BufferGeometry(), posArr = new Float32Array(30), velArr = [];
            for(let i=0; i<10; i++) { posArr[i*3]=pos.x; posArr[i*3+1]=pos.y; posArr[i*3+2]=pos.z; velArr.push((Math.random()-0.5)*0.5, Math.random()*0.5, (Math.random()-0.5)*0.5); }
            geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
            const p = new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.2, color: color })); scene.add(p);
            gameState.particulas.push({ mesh: p, vel: velArr, vida: 15 });
        }

        function darDanoBot(i, dmg, esJugador) {
            let b = gameState.bots[i]; b.hp -= dmg; crearImpacto(b.mesh.position, 0xff3b30);
            if(b.hp <= 0) {
                scene.remove(b.mesh); gameState.bots.splice(i, 1);
                if(esJugador === true || esJugador === -2) { gameState.stats.kills++; agregarXP(50); actualizarUI(); }
            }
        }

        // ==========================================
        // CONTROLES E INTERFAZ (PointerLock + Touch)
        // ==========================================
        let yaw = 0, pitch = 0;
        const teclas = { w:0, a:0, s:0, d:0, ' ':0, shift:0, f:0 };
        window.addEventListener('keydown', e => { if(teclas[e.key.toLowerCase()] !== undefined) teclas[e.key.toLowerCase()] = 1; });
        window.addEventListener('keyup', e => { if(teclas[e.key.toLowerCase()] !== undefined) teclas[e.key.toLowerCase()] = 0; });
        
        // Ratón
        window.addEventListener('mousedown', e => { if(e.button===0) disparando=true; });
        window.addEventListener('mouseup', e => { if(e.button===0) disparando=false; });
        document.body.addEventListener('click', () => { if(estadoJuego==='JUGANDO' && !isMobile) document.body.requestPointerLock(); });
        window.addEventListener('mousemove', e => {
            if(document.pointerLockElement) { yaw -= e.movementX * 0.003; pitch -= e.movementY * 0.003; pitch = Math.max(-0.5, Math.min(Math.PI/3, pitch)); }
        });

        // Touch (Joysticks)
        let jMoveID = null, jAimID = null, mDir = new THREE.Vector2(), aDir = new THREE.Vector2();
        if(isMobile) {
            document.getElementById('mobile-controls').style.display = 'block';
            const bindJoy = (zoneId, stickId, vec, isAim) => {
                const z = document.getElementById(zoneId), s = document.getElementById(stickId);
                z.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; if(!isAim) jMoveID = t.identifier; else { jAimID = t.identifier; disparando = true; } });
                z.addEventListener('touchmove', e => {
                    e.preventDefault();
                    for(let i=0; i<e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        if((!isAim && t.identifier===jMoveID) || (isAim && t.identifier===jAimID)) {
                            const rect = z.getBoundingClientRect(), cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
                            let dx = t.clientX - cx, dy = t.clientY - cy;
                            const dist = Math.min(Math.hypot(dx, dy), 40); const ang = Math.atan2(dy, dx);
                            s.style.transform = `translate(calc(-50% + ${Math.cos(ang)*dist}px), calc(-50% + ${Math.sin(ang)*dist}px))`;
                            vec.set(dx, dy).normalize();
                            if(isAim) { yaw -= vec.x * 0.05; pitch -= vec.y * 0.05; pitch = Math.max(-0.5, Math.min(Math.PI/3, pitch)); }
                        }
                    }
                });
                z.addEventListener('touchend', e => {
                    e.preventDefault();
                    for(let i=0; i<e.changedTouches.length; i++) {
                        if(!isAim && e.changedTouches[i].identifier===jMoveID) { jMoveID = null; vec.set(0,0); s.style.transform = 'translate(-50%,-50%)'; }
                        if(isAim && e.changedTouches[i].identifier===jAimID) { jAimID = null; vec.set(0,0); s.style.transform = 'translate(-50%,-50%)'; disparando=false; }
                    }
                });
            };
            bindJoy('joy-move', 'stick-move', mDir, false); bindJoy('joy-aim', 'stick-aim', aDir, true);
            document.getElementById('btn-vehiculo').ontouchstart = () => teclas.f = 1;
            document.getElementById('btn-vehiculo').ontouchend = () => teclas.f = 0;
            document.getElementById('btn-aliado').ontouchstart = () => reclutarAliado();
        }

        // ==========================================
        // UI TIENDA Y ESTADOS
        // ==========================================
        function renderMenu() {
            document.getElementById('menu-monedas').innerText = monedasGlobales;
            document.getElementById('menu-nivel').innerText = nivelGlobal;
            
            const gP = document.getElementById('grid-personajes'); gP.innerHTML = '';
            DATOS.personajes.forEach((p, idx) => {
                const div = document.createElement('div');
                const reqNivel = p.nv > nivelGlobal;
                div.className = `item-tienda ${selPersonaje === idx ? 'activo' : ''} ${reqNivel ? 'bloqueado' : ''}`;
                div.innerHTML = `<strong style="font-size: 1rem;">${p.n}</strong><br>` + 
                                (reqNivel ? `<span class="tag-req">Nv.${p.nv}</span>` : '') +
                                (p.desbloqueado ? `<span style="color:#34c759; font-size:0.8rem; display:block; margin-top:5px;">Equipado</span>` : `<span class="tag-precio">${p.p} TK</span>`);
                div.onclick = () => {
                    if(reqNivel) return;
                    if(p.desbloqueado) { selPersonaje = idx; renderMenu(); }
                    else if(monedasGlobales >= p.p) {
                        monedasGlobales -= p.p; p.desbloqueado = true; selPersonaje = idx;
                        unlocks.push(p.id); localStorage.setItem('tt_unlocks', JSON.stringify(unlocks));
                        localStorage.setItem('tt_coins', monedasGlobales); renderMenu();
                    }
                };
                gP.appendChild(div);
            });

            const gA = document.getElementById('grid-armas'); gA.innerHTML = '';
            DATOS.armas.forEach((a, idx) => {
                const div = document.createElement('div');
                const reqNivel = a.nv > nivelGlobal;
                div.className = `item-tienda ${selArma === idx ? 'activo' : ''} ${reqNivel ? 'bloqueado' : ''}`;
                const unlocked = unlocks.includes(a.id);
                div.innerHTML = `<strong style="font-size: 1rem;">${a.n}</strong><br><span style="font-size:0.75rem; color:#86868b; display:block;">DMG: ${a.dmg}</span>` +
                                (reqNivel ? `<span class="tag-req">Nv.${a.nv}</span>` : '') +
                                (unlocked ? `<span style="color:#34c759; font-size:0.8rem;">Equipado</span>` : `<span class="tag-precio">${a.p} TK</span>`);
                div.onclick = () => {
                    if(reqNivel) return;
                    if(unlocked) { selArma = idx; renderMenu(); }
                    else if(monedasGlobales >= a.p) {
                        monedasGlobales -= a.p; unlocks.push(a.id); selArma = idx;
                        localStorage.setItem('tt_unlocks', JSON.stringify(unlocks));
                        localStorage.setItem('tt_coins', monedasGlobales); renderMenu();
                    }
                };
                gA.appendChild(div);
            });
        }

        document.getElementById('btn-jugar').onclick = () => {
            initAudio(); document.getElementById('pantalla-inicio').classList.add('oculto');
            document.getElementById('ui').style.display = 'block'; document.getElementById('crosshair').style.display = isMobile ? 'none' : 'block';
            inicializarPartida(); spawnJugador(); spawnBots(15); actualizarUI(); estadoJuego = 'JUGANDO';
        };

        document.getElementById('btn-volver').onclick = () => {
            document.getElementById('pantalla-fin').classList.add('oculto'); document.getElementById('pantalla-inicio').classList.remove('oculto');
            estadoJuego = 'MENU'; renderMenu();
        };

        function finJuego() {
            estadoJuego = 'FIN'; document.getElementById('ui').style.display = 'none'; document.getElementById('crosshair').style.display = 'none';
            document.getElementById('pantalla-fin').classList.remove('oculto'); document.exitPointerLock?.();
            
            const pos = gameState.bots.length + 1; const tk = (gameState.stats.kills * 25) + (pos === 1 ? 200 : 0); const xpGain = tk * 2;
            document.getElementById('posicion-final').innerText = `#${pos}`; document.getElementById('monedas-ganadas').innerText = tk; document.getElementById('xp-ganada').innerText = xpGain;
            monedasGlobales += tk; agregarXP(xpGain);
            localStorage.setItem('tt_coins', monedasGlobales);
        }

        function actualizarUI() {
            document.getElementById('hp-text').innerText = Math.max(0, Math.ceil(gameState.jugador.hp));
            document.getElementById('hp-bar').style.width = Math.max(0, (gameState.jugador.hp / gameState.jugador.maxHp) * 100) + '%';
            document.getElementById('alive-text').innerText = gameState.bots.length + (gameState.jugador.vivo ? 1 : 0);
            document.getElementById('monedas-text').innerText = monedasGlobales + (gameState.stats.kills * 25);
            document.getElementById('ammo-text').innerText = gameState.jugador.ammo === Infinity ? '∞' : gameState.jugador.ammo;
            document.getElementById('nivel-text').innerText = nivelGlobal;
            document.getElementById('xp-bar').style.width = (xpGlobal / requerimientoXP(nivelGlobal)) * 100 + '%';
            if(gameState.bots.length === 0 && gameState.jugador.vivo) finJuego();
        }

        function colisionMuros(box) {
            for(let o of obstaculos) if(box.intersectsBox(o.box)) return true;
            return false;
        }

        // ==========================================
        // BUCLE PRINCIPAL (RENDER & FÍSICAS)
        // ==========================================
        window.addEventListener('keydown', e => { if(e.key==='e' && estadoJuego==='JUGANDO') reclutarAliado(); });
        let inVehiculo = null;

        function animar() {
            requestAnimationFrame(animar);
            const time = Date.now() * 0.005;

            if(estadoJuego === 'JUGANDO') {
                zoneData.radio -= zoneData.shrinkSpeed; meshZona.scale.set(Math.max(8, zoneData.radio), 1, Math.max(8, zoneData.radio));
                const playerBox = new THREE.Box3();

                // Físicas Jugador / Vehículo
                if(gameState.jugador.vivo) {
                    if(gameState.jugador.cd > 0) gameState.jugador.cd--;
                    const aM = gameState.jugador.armaMesh.children[0]; aM.position.z = THREE.MathUtils.lerp(aM.position.z, -0.4, 0.15);
                    const dW = DATOS.armas[selArma];
                    
                    if(disparando && gameState.jugador.cd <= 0 && !inVehiculo) {
                        ejecutarDisparo(gameState.jugador.mesh, gameState.jugador.armaMesh, true, dW);
                        gameState.jugador.cd = dW.cd; if(!dW.au) disparando = false; 
                    }

                    // Vector Movimiento Global
                    let vx = 0, vz = 0;
                    if(!isMobile) {
                        if(teclas.w) vz -= 1; if(teclas.s) vz += 1; if(teclas.a) vx -= 1; if(teclas.d) vx += 1;
                    } else { vx = mDir.x; vz = mDir.y; }
                    
                    const mVec = new THREE.Vector3(vx, 0, vz);
                    if(mVec.lengthSq() > 0) mVec.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw);

                    // Vehículo Interacción
                    if(teclas.f) {
                        teclas.f = 0; // debounce
                        if(inVehiculo) {
                            gameState.jugador.mesh.position.copy(inVehiculo.mesh.position).add(new THREE.Vector3(3,0,0));
                            scene.add(gameState.jugador.mesh); inVehiculo.piloto = false; inVehiculo = null;
                        } else {
                            for(let v of gameState.vehiculos) {
                                if(v.mesh.position.distanceTo(gameState.jugador.mesh.position) < 5) {
                                    inVehiculo = v; v.piloto = true; scene.remove(gameState.jugador.mesh); break;
                                }
                            }
                        }
                    }

                    if(inVehiculo) {
                        // Control Helicóptero
                        inVehiculo.rotor.rotation.y += 0.6;
                        inVehiculo.mesh.rotation.y = yaw;
                        inVehiculo.vel.x += mVec.x * 0.02; inVehiculo.vel.z += mVec.z * 0.02;
                        inVehiculo.vel.y += (teclas[' '] ? 0.02 : (teclas.shift ? -0.02 : 0)) - 0.005; // Gravedad
                        inVehiculo.vel.multiplyScalar(0.95);
                        inVehiculo.mesh.position.add(inVehiculo.vel);
                        if(inVehiculo.mesh.position.y < 0) { inVehiculo.mesh.position.y = 0; inVehiculo.vel.y = 0; }
                        
                        camera.position.set(inVehiculo.mesh.position.x - Math.sin(yaw)*15, inVehiculo.mesh.position.y + 8, inVehiculo.mesh.position.z - Math.cos(yaw)*15);
                        camera.lookAt(inVehiculo.mesh.position);
                    } else {
                        // Control Pie
                        if(mVec.lengthSq() > 0) {
                            const nP = gameState.jugador.mesh.position.clone().add(mVec.multiplyScalar(gameState.jugador.speed));
                            playerBox.setFromCenterAndSize(nP.clone().add(new THREE.Vector3(0,1,0)), new THREE.Vector3(1,2,1));
                            if(!colisionMuros(playerBox)) gameState.jugador.mesh.position.copy(nP);
                            
                            const tR = Math.atan2(mVec.x, mVec.z);
                            let dR = tR - gameState.jugador.mesh.rotation.y;
                            while(dR < -Math.PI) dR += Math.PI*2; while(dR > Math.PI) dR -= Math.PI*2;
                            gameState.jugador.mesh.rotation.y += dR * 0.25;
                        }
                        
                        if(gameState.jugador.mesh.userData.t === 'dron') {
                            gameState.jugador.mesh.position.y = Math.sin(time + gameState.jugador.mesh.userData.off)*0.2 + 1.2;
                            gameState.jugador.mesh.userData.aspas.forEach(a => a.rotation.y += 0.8);
                        } else gameState.jugador.mesh.position.y = mVec.lengthSq()>0 ? Math.abs(Math.sin(time*2.5))*0.15 : 0;

                        // Cámara 3ra Persona Orbital
                        camera.position.set(gameState.jugador.mesh.position.x - Math.sin(yaw)*12, gameState.jugador.mesh.position.y + 6 + Math.sin(pitch)*10, gameState.jugador.mesh.position.z - Math.cos(yaw)*12);
                        camera.lookAt(gameState.jugador.mesh.position.x, gameState.jugador.mesh.position.y + 2, gameState.jugador.mesh.position.z);
                    }

                    // Ammo Drops
                    const refPos = inVehiculo ? inVehiculo.mesh.position : gameState.jugador.mesh.position;
                    for(let d=gameState.drops.length-1; d>=0; d--) {
                        if(refPos.distanceTo(gameState.drops[d].mesh.position) < 3) {
                            gameState.jugador.ammo = DATOS.armas[selArma].max; playSonido('recarga');
                            scene.remove(gameState.drops[d].mesh); gameState.drops.splice(d, 1); actualizarUI();
                        }
                    }

                    // Daño Zona
                    if(Math.hypot(refPos.x, refPos.z) > zoneData.radio) {
                        gameState.jugador.hp -= zoneData.dps / 60; document.getElementById('zone-warning').style.display = 'block'; actualizarUI();
                        if(gameState.jugador.hp <= 0) { gameState.jugador.vivo = false; finJuego(); }
                    } else document.getElementById('zone-warning').style.display = 'none';
                }

                // Helicópteros inactivos
                gameState.vehiculos.forEach(v => { if(!v.piloto) { v.rotor.rotation.y *= 0.98; if(v.mesh.position.y > 0) { v.mesh.position.y -= 0.1; } } });

                // IA Aliados (FSM)
                for(let i=gameState.aliados.length-1; i>=0; i--) {
                    let a = gameState.aliados[i]; if(a.cd > 0) a.cd--;
                    a.armaMesh.children[0].position.z = THREE.MathUtils.lerp(a.armaMesh.children[0].position.z, -0.4, 0.15);
                    a.mesh.position.y = Math.abs(Math.sin(time*2.5))*0.15;
                    
                    let dMin = 40; a.obj = null;
                    gameState.bots.forEach(b => { let d = a.mesh.position.distanceTo(b.mesh.position); if(d<dMin){dMin=d; a.obj=b;} });
                    
                    if(a.obj) {
                        if(dMin > 10) {
                            let dir = new THREE.Vector3().subVectors(a.obj.mesh.position, a.mesh.position).normalize();
                            a.mesh.position.add(dir.multiplyScalar(a.speed)); a.mesh.rotation.y = Math.atan2(dir.x, dir.z);
                        } else if(a.cd <= 0) {
                            a.mesh.rotation.y = Math.atan2(a.obj.mesh.position.x - a.mesh.position.x, a.obj.mesh.position.z - a.mesh.position.z);
                            ejecutarDisparo(a.mesh, a.armaMesh, -2, DATOS.armas[a.armaIdx]); a.cd = DATOS.armas[a.armaIdx].cd + 20;
                        }
                    } else if (gameState.jugador.vivo && !inVehiculo) {
                        let dJ = a.mesh.position.distanceTo(gameState.jugador.mesh.position);
                        if(dJ > 4) {
                            let dir = new THREE.Vector3().subVectors(gameState.jugador.mesh.position, a.mesh.position).normalize();
                            a.mesh.position.add(dir.multiplyScalar(a.speed)); a.mesh.rotation.y = Math.atan2(dir.x, dir.z);
                        }
                    }
                    if(Math.hypot(a.mesh.position.x, a.mesh.position.z) > zoneData.radio) a.hp -= zoneData.dps/60;
                    if(a.hp <= 0) { scene.remove(a.mesh); gameState.aliados.splice(i,1); }
                }

                // IA Bots
                for(let i=gameState.bots.length-1; i>=0; i--) {
                    let b = gameState.bots[i]; if(b.cd > 0) b.cd--;
                    b.armaMesh.children[0].position.z = THREE.MathUtils.lerp(b.armaMesh.children[0].position.z, -0.4, 0.15);
                    if(b.mesh.userData.t==='dron') { b.mesh.position.y = Math.sin(time+b.mesh.userData.off)*0.2+1.2; b.mesh.userData.aspas.forEach(as=>as.rotation.y+=0.8); }
                    else b.mesh.position.y = Math.abs(Math.sin(time*2.5+b.mesh.userData.off))*0.15;

                    let o = null, dM = 50;
                    if(gameState.jugador.vivo && !inVehiculo) { let d=b.mesh.position.distanceTo(gameState.jugador.mesh.position); if(d<dM){dM=d; o=gameState.jugador;} }
                    gameState.aliados.forEach(al => { let d=b.mesh.position.distanceTo(al.mesh.position); if(d<dM){dM=d; o=al;} });

                    if(o) {
                        const dA = DATOS.armas[b.armaIdx];
                        if(dM > (dA.ml ? 2 : 18)) {
                            let dir = new THREE.Vector3().subVectors(o.mesh.position, b.mesh.position).normalize();
                            let nP = b.mesh.position.clone().add(dir.multiplyScalar(b.speed));
                            b.box.setFromCenterAndSize(nP.clone().add(new THREE.Vector3(0,1,0)), new THREE.Vector3(1,2,1));
                            if(!colisionMuros(b.box)) { b.mesh.position.copy(nP); b.mesh.rotation.y = Math.atan2(dir.x, dir.z); }
                            else { b.mesh.position.x += (Math.random()-0.5)*b.speed*2; b.mesh.position.z += (Math.random()-0.5)*b.speed*2; }
                        } else if(b.cd <= 0) {
                            b.mesh.rotation.y = Math.atan2(o.mesh.position.x - b.mesh.position.x, o.mesh.position.z - b.mesh.position.z);
                            ejecutarDisparo(b.mesh, b.armaMesh, false, dA); b.cd = dA.cd + 40;
                        }
                    }
                    if(Math.hypot(b.mesh.position.x, b.mesh.position.z) > zoneData.radio) b.hp -= zoneData.dps/60;
                    if(b.hp <= 0) darDanoBot(i, 999, false);
                }

                // Proyectiles AABB
                for(let i=gameState.proyectiles.length-1; i>=0; i--) {
                    let p = gameState.proyectiles[i]; p.mesh.position.addScaledVector(p.dir, p.spd); p.vida--; let dest = false;
                    p.box.setFromCenterAndSize(p.mesh.position, new THREE.Vector3(0.5,0.5,0.5));

                    if(colisionMuros(p.box)) { crearImpacto(p.mesh.position, 0xaaaaaa); dest = true; }
                    else if(!p.esJ && gameState.jugador.vivo && !inVehiculo && p.box.intersectsBox(playerBox.setFromObject(gameState.jugador.mesh))) {
                        gameState.jugador.hp -= p.dmg; crearImpacto(p.mesh.position, 0xff3b30); actualizarUI(); dest = true;
                        if(gameState.jugador.hp <= 0) { gameState.jugador.vivo = false; finJuego(); }
                    } else if(p.esJ || p.esJ === -2) {
                        for(let b=gameState.bots.length-1; b>=0; b--) {
                            if(p.box.intersectsBox(gameState.bots[b].box.setFromObject(gameState.bots[b].mesh))) { darDanoBot(b, p.dmg, p.esJ); dest = true; break; }
                        }
                    }
                    if(p.vida <= 0 || dest) { scene.remove(p.mesh); gameState.proyectiles.splice(i, 1); }
                }

                // Partículas
                for(let i=gameState.particulas.length-1; i>=0; i--) {
                    let p = gameState.particulas[i]; p.vida--;
                    if(p.mesh.geometry) {
                        const arr = p.mesh.geometry.attributes.position.array;
                        for(let j=0; j<arr.length/3; j++) { arr[j*3]+=p.vel[j*3]; arr[j*3+1]+=p.vel[j*3+1]; arr[j*3+2]+=p.vel[j*3+2]; p.vel[j*3+1]-=0.01; }
                        p.mesh.geometry.attributes.position.needsUpdate = true; p.mesh.material.opacity = Math.max(0, p.vida/15);
                    }
                    if(p.vida<=0) { scene.remove(p.mesh); gameState.particulas.splice(i, 1); }
                }
                gameState.drops.forEach(d => { d.mesh.rotation.x+=0.01; d.mesh.rotation.y+=0.02; d.mesh.position.y=Math.sin(time*2)*0.2+0.5; });
            } else if(estadoJuego === 'MENU') {
                camera.position.set(Math.sin(time*0.1)*30, 20, Math.cos(time*0.1)*30); camera.lookAt(0,0,0);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); });
        renderMenu(); animar();
    </script>
</body>
</html>
